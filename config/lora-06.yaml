# === Training Configuration with LoRA (Fixed) ===

# === البيانات ===
# تم إزالة التكرار
manifest_path: "data/manifests/full_wav_txt_single.json"
valid_ratio: 0.01
cache_dir: "data/processed"

# === النموذج الأساسي ===
# أنت تستخدم نموذج عام من Hugging Face كبداية (Clean Start)
base_model_path: "/media/AI/MioTTS-0.6B" 

# === LoRA Configuration ===
lora_enabled: true
lora_r: 128
lora_alpha: 256
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# === معايير التدريب ===
max_steps: 60000
save_every: 100
log_every: 50
eval_every: 1000
batch_size: 2
gradient_accumulation: 8
enable_gradient_checkpointing: false
use_cpu_offload: false
learning_rate: 2e-5
warmup_steps: 1500
weight_decay: 0.01
gradient_clip: 1.0

# === Data Settings ===
codec_path: "Aratako/MioCodec-25Hz-24kHz"
codec_sample_rate: 24000
audio_token_min: 70145
audio_token_max: 82944
vocab_size: 82945
max_audio_tokens: 744
max_position_embeddings: 844

# === DataLoader ===
num_workers: 2
pin_memory: true
persistent_workers: false
prefetch_factor: 2
