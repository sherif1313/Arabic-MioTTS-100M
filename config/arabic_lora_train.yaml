# === البيانات ===
manifest_path: "data/manifests/full_wav_txt_single.json"   # غير اسم ملف البيانات
valid_ratio: 0.01
cache_dir: "data/processed"

# === النموذج الأساسي ===
base_model_path: "sherif1313/Arabic-MioTTS-100M" 
# === LoRA Configuration ===
lora_enabled: true
lora_r: 128
lora_alpha: 256
lora_dropout: 0.1
lora_target_modules:
  - "mamba.in_proj"
  # ✅ تمت إزالة mamba.out_proj لتجنب الخطأ
  - "feed_forward.gate_proj"
  - "feed_forward.down_proj"
  - "feed_forward.up_proj"

# === معايير التدريب ===
max_steps: 60000
save_every: 100
log_every: 50
eval_every: 1000
batch_size: 4
gradient_accumulation: 16
enable_gradient_checkpointing: false
use_cpu_offload: false
learning_rate: 2e-5
warmup_steps: 1500
weight_decay: 0.01
gradient_clip: 1.0

# === Data Settings ===
codec_path: "Aratako/MioCodec-25Hz-24kHz"
codec_sample_rate: 24000
audio_token_min: 70145
audio_token_max: 82944
vocab_size: 82945
max_audio_tokens: 744
max_position_embeddings: 844

# === DataLoader ===
num_workers: 2
pin_memory: true
persistent_workers: false
prefetch_factor: 2
pin_memory: true
persistent_workers: false
prefetch_factor: 2
